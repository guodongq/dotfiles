- defaults:
    link:
      create: true
      relink: true

- clean: ["~"]

- link:
    ~/.zshrc: .zshrc
    ~/.npmrc: .npmrc
    ~/.gitconfig:
      force: true
      path: .gitconfig
    ~/.config/nvim:
      force: true
      path: nvim

- shell:
    - description: Installing pinned Oh My Zsh dependencies
      command: |
        install_git_repo() {
          repo="$1"
          target="$2"
          revision="$3"

          if [ ! -d "$target/.git" ]; then
            git clone "$repo" "$target"
          fi
          if ! git -C "$target" cat-file -e "$revision^{commit}" 2>/dev/null; then
            git -C "$target" fetch --depth=1 origin "$revision"
          fi
          git -C "$target" checkout --detach --quiet "$revision"
        }

        ZSH_DIR="${ZSH:-$HOME/.oh-my-zsh}"
        ZSH_CUSTOM="${ZSH_CUSTOM:-$ZSH_DIR/custom}"
        install_git_repo https://github.com/ohmyzsh/ohmyzsh.git "$ZSH_DIR" 677a4592b18c08ddea737f8aca70bac0e9fc9313
        mkdir -p "$ZSH_CUSTOM/plugins"
        install_git_repo https://github.com/zsh-users/zsh-autosuggestions "$ZSH_CUSTOM/plugins/zsh-autosuggestions" c3d4e576c9c86eac62884bd47c01f6faed043fc5
        install_git_repo https://github.com/zsh-users/zsh-completions "$ZSH_CUSTOM/plugins/zsh-completions" 7a884c75b4f3ce2d8d24df8e55dcc359a020be3f
        install_git_repo https://github.com/zsh-users/zsh-syntax-highlighting "$ZSH_CUSTOM/plugins/zsh-syntax-highlighting" e0165eaa730dd0fa321a6a6de74f092fe87630b0
        install_git_repo https://github.com/zsh-users/zsh-history-substring-search "$ZSH_CUSTOM/plugins/zsh-history-substring-search" 87ce96b1862928d84b1afe7c173316614b30e301
    - description: Creating local shell settings
      command: |
        [ -e "$HOME/.zshrc.local" ] || cp .zshrc.local.example "$HOME/.zshrc.local"
      stdin: true
      stdout: true
      stderr: true
